# https://vincent.jousse.org/blog/en/running-prettier-with-pre-commit/
repos:
  - repo: local
    hooks:
      - id: prettier
        name: run prettier
        language: system
        files: ^frontend/src/.*$
        types_or: [javascript, jsx, ts, tsx]
        entry: |
          bash -c 'npm --prefix frontend/ run format -- "${@#frontend/}"' --
      - id: clang-format
        name: run clang-format
        language: system
        files: ^internal/.*$
        types_or: [c++, c]
        entry: |
          clang-format -i --
