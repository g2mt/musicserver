<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Player</title>
    <link rel="icon" type="image/png" sizes="48x48" href="/branding/favicons/48x48.png" />
    <link rel="icon" type="image/png" sizes="72x72" href="/branding/favicons/72x72.png" />
    <link rel="icon" type="image/png" sizes="144x144" href="/branding/favicons/144x144.png" />
  </head>
  <body style="opacity:0;">
    <!-- Prevent flickering by setting root background directly after loading -->
    <script>
    (() => {
      try {
        const config = JSON.parse((window._native_settings ?? localStorage).getItem("_config"));
        document.documentElement.style.background=config.darkMode?"#000":"#fff";
      } catch(e) {}
    })();
    </script>
    <div id="root"></div>
    <canvas id="background-overlay"></canvas>
    <script type="module" src="/src/main.tsx"></script>
    <script>console.log("Page loaded");</script>
  </body>
</html>
